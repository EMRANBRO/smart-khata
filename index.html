<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Smart Khata</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1d6fba;
    --primary-light: #2e86d4;
    --primary-dark: #155a96;
    --danger: #c0392b;
    --danger-light: #fdecea;
    --success: #1a7a40;
    --success-light: #e8f8ee;
    --bg: #f5f6fa;
    --card: #ffffff;
    --text: #1a1a2e;
    --text2: #3a3a5c;
    --text3: #8e8ea8;
    --border: #dde1ef;
    --shadow: 0 4px 24px rgba(30,40,80,0.10);
    --shadow2: 0 2px 10px rgba(30,40,80,0.07);
    --radius: 16px;
    --radius-sm: 10px;
    --loan-color: #c0392b;
    --paid-color: #1a7a40;
    --due-color: #c47d0e;
  }
  [data-theme="dark"] {
    --primary: #3b82f6;
    --primary-light: #60a5fa;
    --primary-dark: #2563eb;
    --danger: #f87171;
    --danger-light: #3f1515;
    --success: #34d399;
    --success-light: #0d2d22;
    --bg: #1a1f2e;
    --card: #262c3e;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --text3: #475569;
    --border: #334155;
    --shadow: 0 4px 24px rgba(0,0,0,0.35);
    --shadow2: 0 2px 8px rgba(0,0,0,0.25);
    --loan-color: #f87171;
    --paid-color: #34d399;
    --due-color: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Hind Siliguri', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
    overflow-x: hidden;
  }
  [data-theme="light"] body {
    background: linear-gradient(160deg, #eef2fb 0%, #f5f6fa 50%, #e8f0ff 100%);
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1a3a6e 0%, #1d6fba 60%, #2e86d4 100%);
    padding: 16px 18px 13px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 3px 16px rgba(0,0,0,0.18);
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-logo { font-size: 26px; }
  .header-title h1 { color: #fff; font-size: 1.2rem; font-weight: 700; }
  .header-title p { color: rgba(255,255,255,0.75); font-size: 0.7rem; margin-top: 1px; }
  .dark-toggle {
    background: rgba(255,255,255,0.18); border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 50px; width: 46px; height: 26px; cursor: pointer;
    position: relative; transition: background 0.3s; flex-shrink: 0;
  }
  .dark-toggle .tog-knob {
    position: absolute; top: 3px; left: 3px;
    width: 18px; height: 18px; border-radius: 50%;
    background: #fff; font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    transition: left 0.3s; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  [data-theme="dark"] .dark-toggle .tog-knob { left: 23px; }

  /* MAIN */
  .main { padding: 16px 14px 96px; max-width: 500px; margin: 0 auto; }

  /* SEARCH */
  .search-wrap { position: relative; margin-bottom: 14px; }
  .search-wrap input {
    width: 100%; padding: 12px 14px 12px 42px;
    border-radius: 50px; border: 1.5px solid var(--border);
    background: var(--card); color: var(--text);
    font-family: inherit; font-size: 0.95rem; outline: none;
    box-shadow: var(--shadow2); transition: border 0.2s;
  }
  .search-wrap input:focus { border-color: var(--primary); }
  .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 17px; pointer-events: none; }
  .search-wrap input::placeholder { color: var(--text3); }

  /* SUMMARY */
  .summary-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 18px; }
  .summary-card {
    background: var(--card); border-radius: var(--radius-sm);
    padding: 12px 8px 10px; text-align: center;
    box-shadow: var(--shadow2); border: 1.5px solid var(--border);
  }
  .summary-card .s-icon { font-size: 18px; margin-bottom: 3px; }
  .summary-card .s-label { font-size: 0.68rem; color: var(--text3); margin-bottom: 2px; }
  .summary-card .s-val { font-size: 0.95rem; font-weight: 700; }
  .s-loan .s-val { color: var(--loan-color); }
  .s-paid .s-val { color: var(--paid-color); }
  .s-due .s-val { color: var(--due-color); }

  /* SECTION */
  .section-title { font-size: 0.75rem; font-weight: 600; color: var(--text3); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 10px; padding-left: 3px; }

  /* CUSTOMER CARDS */
  .customer-list { display: flex; flex-direction: column; gap: 10px; }
  .customer-card {
    background: var(--card); border-radius: var(--radius);
    padding: 14px 14px 12px; box-shadow: var(--shadow2);
    border: 1.5px solid var(--border); cursor: pointer;
    transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
    animation: fadeIn 0.3s ease both;
  }
  .customer-card.selected { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(29,111,186,0.12), var(--shadow); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .card-info { display: flex; align-items: center; gap: 11px; }
  .avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(135deg, #155a96 0%, #2e86d4 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .card-name { font-size: 1rem; font-weight: 600; }
  .card-phone { font-size: 0.78rem; color: var(--text3); margin-top: 2px; }
  .btn-del {
    width: 32px; height: 32px; border-radius: 50%; border: none;
    background: var(--danger-light); color: var(--danger);
    font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.15s; flex-shrink: 0;
  }
  .btn-del:active { transform: scale(0.88); background: var(--danger); color: #fff; }

  .card-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; background: var(--bg); border-radius: var(--radius-sm); padding: 9px; }
  [data-theme="dark"] .card-stats { background: rgba(0,0,0,0.2); }
  .stat-item { text-align: center; }
  .stat-label { font-size: 0.65rem; color: var(--text3); margin-bottom: 1px; }
  .stat-val { font-size: 0.9rem; font-weight: 700; }
  .stat-loan { color: var(--loan-color); }
  .stat-paid { color: var(--paid-color); }
  .stat-due { color: var(--due-color); }

  /* DETAIL PANEL */
  .detail-panel { background: var(--card); border-radius: var(--radius); border: 1.5px solid var(--border); box-shadow: var(--shadow); margin-top: 12px; overflow: hidden; animation: fadeIn 0.25s ease both; }
  .detail-header { background: linear-gradient(135deg, #155a96 0%, #1d6fba 100%); padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; }
  .detail-header h3 { color: #fff; font-size: 0.95rem; }
  .detail-header span { color: rgba(255,255,255,0.75); font-size: 0.78rem; }
  .detail-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px 14px 0; }
  .btn-action {
    border: none; border-radius: var(--radius-sm); padding: 12px 8px;
    font-family: inherit; font-size: 0.88rem; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: transform 0.15s, opacity 0.15s; box-shadow: var(--shadow2);
  }
  .btn-action:active { transform: scale(0.95); opacity: 0.85; }
  .btn-loan { background: linear-gradient(135deg, #dc2626, #ef4444); color: #fff; }
  .btn-payment { background: linear-gradient(135deg, #059669, #10b981); color: #fff; }

  /* TX LIST */
  .tx-list { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 7px; }
  .tx-empty { text-align: center; color: var(--text3); font-size: 0.85rem; padding: 14px 0; }
  .tx-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 11px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border); background: var(--bg);
    animation: fadeIn 0.2s both;
  }
  [data-theme="dark"] .tx-item { background: rgba(0,0,0,0.15); }
  .tx-left { display: flex; align-items: center; gap: 9px; }
  .tx-icon { font-size: 17px; }
  .tx-type { font-size: 0.8rem; font-weight: 600; }
  .tx-date { font-size: 0.7rem; color: var(--text3); margin-top: 1px; }
  .tx-amount { font-size: 0.95rem; font-weight: 700; }
  .tx-loan .tx-type, .tx-loan .tx-amount { color: var(--loan-color); }
  .tx-paid .tx-type, .tx-paid .tx-amount { color: var(--paid-color); }

  /* MODALS */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 200; animation: ovIn 0.2s both;
  }
  @keyframes ovIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-box {
    background: var(--card); border-radius: var(--radius) var(--radius) 0 0;
    padding: 22px 18px 30px; width: 100%; max-width: 500px;
    animation: slideUp 0.28s cubic-bezier(.4,0,.2,1) both;
    max-height: 90vh; overflow-y: auto;
    border-top: 3px solid var(--primary);
  }
  @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
  .modal-field { margin-bottom: 13px; }
  .modal-field label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text2); margin-bottom: 5px; }
  .modal-field input {
    width: 100%; padding: 12px 13px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border); background: var(--bg);
    color: var(--text); font-family: inherit; font-size: 1rem; outline: none;
    transition: border 0.2s;
  }
  .modal-field input:focus { border-color: var(--primary); }
  .modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 18px; }
  .btn-cancel {
    padding: 13px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border); background: var(--bg);
    color: var(--text2); font-family: inherit; font-size: 0.92rem; font-weight: 600; cursor: pointer;
  }
  .btn-submit {
    padding: 13px; border-radius: var(--radius-sm); border: none;
    background: linear-gradient(135deg, #155a96, #2e86d4);
    color: #fff; font-family: inherit; font-size: 0.92rem; font-weight: 600; cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 3px 12px rgba(29,111,186,0.25);
  }
  .btn-submit:active { transform: scale(0.97); }
  .btn-submit-danger { background: linear-gradient(135deg, #c0392b, #e74c3c); }

  /* CONFIRM */
  .confirm-overlay { align-items: center; }
  .confirm-box {
    border-radius: var(--radius); max-height: unset;
    padding: 26px 22px; text-align: center;
    width: calc(100% - 32px); max-width: 320px;
    animation: popIn 0.22s cubic-bezier(.4,0,.2,1) both;
  }
  @keyframes popIn { from { transform: scale(0.88); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .confirm-icon { font-size: 40px; margin-bottom: 10px; }
  .confirm-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 7px; }
  .confirm-msg { font-size: 0.87rem; color: var(--text2); margin-bottom: 18px; line-height: 1.5; }
  .confirm-btns { display: flex; gap: 10px; }

  /* FAB */
  .fab {
    position: fixed; bottom: 24px; right: 18px;
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, #155a96, #2e86d4);
    border: none; color: #fff; font-size: 26px;
    box-shadow: 0 5px 20px rgba(29,111,186,0.40);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s; z-index: 50;
  }
  .fab:active { transform: scale(0.92); }

  /* EMPTY */
  .empty-state { text-align: center; padding: 36px 16px; }
  .empty-state .e-icon { font-size: 52px; margin-bottom: 12px; opacity: 0.5; }
  .empty-state h3 { font-size: 1.05rem; font-weight: 600; color: var(--text2); margin-bottom: 5px; }
  .empty-state p { font-size: 0.85rem; color: var(--text3); }
  .no-result { text-align: center; color: var(--text3); font-size: 0.88rem; padding: 22px; }

  /* TOAST */
  .toast {
    position: fixed; top: 68px; left: 50%; transform: translateX(-50%) translateY(-16px);
    background: linear-gradient(135deg, #155a96, #1d6fba);
    color: #fff; padding: 10px 20px; border-radius: 50px;
    font-size: 0.85rem; font-weight: 500;
    box-shadow: 0 4px 14px rgba(0,0,0,0.2); z-index: 300;
    opacity: 0; pointer-events: none; transition: opacity 0.25s, transform 0.25s;
    white-space: nowrap; max-width: 90vw;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">📒</div>
    <div class="header-title">
      <h1>Smart Khata</h1>
      <p>স্মার্ট ডিজিটাল খাতা</p>
    </div>
  </div>
  <button class="dark-toggle" id="darkToggle" title="Dark Mode">
    <div class="tog-knob" id="togKnob">☀️</div>
  </button>
</div>

<div class="main">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="গ্রাহক খুঁজুন..." oninput="render()">
  </div>
  <div class="summary-row">
    <div class="summary-card s-loan"><div class="s-icon">💸</div><div class="s-label">মোট ধার</div><div class="s-val" id="totalLoan">৳০</div></div>
    <div class="summary-card s-paid"><div class="s-icon">✅</div><div class="s-label">পরিশোধ</div><div class="s-val" id="totalPaid">৳০</div></div>
    <div class="summary-card s-due"><div class="s-icon">⚠️</div><div class="s-label">মোট বাকি</div><div class="s-val" id="totalDue">৳০</div></div>
  </div>
  <div class="section-title">গ্রাহক তালিকা</div>
  <div class="customer-list" id="customerList"></div>
</div>

<button class="fab" id="fabBtn">➕</button>
<div class="toast" id="toast"></div>

<!-- ADD CUSTOMER -->
<div class="modal-overlay" id="addCustomerModal" style="display:none">
  <div class="modal-box">
    <div class="modal-title">👤 গ্রাহক যোগ করুন</div>
    <div class="modal-field"><label>নাম *</label><input type="text" id="cName" placeholder="গ্রাহকের নাম লিখুন"></div>
    <div class="modal-field"><label>ফোন নম্বর</label><input type="tel" id="cPhone" placeholder="01XXXXXXXXX"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeM('addCustomerModal')">বাতিল</button>
      <button class="btn-submit" onclick="addCustomer()">✅ যোগ করুন</button>
    </div>
  </div>
</div>

<!-- ADD TRANSACTION -->
<div class="modal-overlay" id="addTxModal" style="display:none">
  <div class="modal-box">
    <div class="modal-title" id="txTitle">💸 ধার যোগ করুন</div>
    <div class="modal-field"><label>পরিমাণ (টাকা) *</label><input type="number" id="txAmt" placeholder="০" min="1" inputmode="numeric"></div>
    <div class="modal-field"><label>তারিখ</label><input type="date" id="txDate"></div>
    <div class="modal-field"><label>নোট (ঐচ্ছিক)</label><input type="text" id="txNote" placeholder="কারণ বা বিবরণ"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeM('addTxModal')">বাতিল</button>
      <button class="btn-submit" id="txBtn" onclick="addTx()">✅ যোগ করুন</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="modal-overlay confirm-overlay" id="confirmModal" style="display:none">
  <div class="modal-box confirm-box">
    <div class="confirm-icon">🗑️</div>
    <div class="confirm-title">গ্রাহক মুছবেন?</div>
    <div class="confirm-msg" id="confirmMsg">এই গ্রাহক এবং সকল লেনদেন মুছে যাবে।</div>
    <div class="confirm-btns">
      <button class="btn-cancel" style="flex:1" onclick="closeM('confirmModal')">না, থাকুক</button>
      <button class="btn-submit btn-submit-danger" style="flex:1" id="confirmOk">হ্যাঁ, মুছুন</button>
    </div>
  </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem('sk_v2') || '[]');
let selId = null, txType = 'loan';

const save = () => localStorage.setItem('sk_v2', JSON.stringify(data));
const openM = id => document.getElementById(id).style.display = 'flex';
const closeM = id => document.getElementById(id).style.display = 'none';

// Close modal on overlay tap
document.querySelectorAll('.modal-overlay').forEach(o =>
  o.addEventListener('click', e => { if (e.target === o) o.style.display = 'none'; })
);

// DARK MODE
const theme = localStorage.getItem('sk_theme') || 'light';
document.documentElement.setAttribute('data-theme', theme);
updateToggle(theme);
document.getElementById('darkToggle').onclick = () => {
  const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('sk_theme', t);
  updateToggle(t);
};
function updateToggle(t) {
  document.getElementById('togKnob').textContent = t === 'dark' ? '🌙' : '☀️';
}

// TOAST
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// UTILS
const bn = n => String(n).replace(/[0-9]/g, d => '০১২৩৪৫৬৭৮৯'[d]);
const money = n => '৳' + bn(Number(n).toLocaleString('en'));
const initials = s => (s||'?').trim()[0].toUpperCase();
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const today = () => new Date().toISOString().split('T')[0];
function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('bn-BD', { day: 'numeric', month: 'short', year: 'numeric' });
}
function calc(c) {
  let loan = 0, paid = 0;
  (c.tx||[]).forEach(t => t.type === 'loan' ? loan += +t.amt : paid += +t.amt);
  return { loan, paid, due: loan - paid };
}

// SUMMARY
function updateSummary() {
  let tl = 0, tp = 0;
  data.forEach(c => { const r = calc(c); tl += r.loan; tp += r.paid; });
  document.getElementById('totalLoan').textContent = money(tl);
  document.getElementById('totalPaid').textContent = money(tp);
  document.getElementById('totalDue').textContent = money(Math.max(0, tl - tp));
}

// FAB
document.getElementById('fabBtn').onclick = () => {
  document.getElementById('cName').value = '';
  document.getElementById('cPhone').value = '';
  openM('addCustomerModal');
  setTimeout(() => document.getElementById('cName').focus(), 250);
};

// ADD CUSTOMER
function addCustomer() {
  const name = document.getElementById('cName').value.trim();
  if (!name) { toast('⚠️ নাম লিখুন'); return; }
  const phone = document.getElementById('cPhone').value.trim();
  data.unshift({ id: uid(), name, phone, tx: [] });
  save(); closeM('addCustomerModal'); render();
  toast('✅ গ্রাহক যোগ হয়েছে');
}

// DELETE
let pendingDel = null;
function delCustomer(id) {
  const c = data.find(x => x.id === id);
  if (!c) return;
  pendingDel = id;
  document.getElementById('confirmMsg').textContent = `"${c.name}" এবং সকল লেনদেন মুছে যাবে।`;
  document.getElementById('confirmOk').onclick = () => {
    data = data.filter(x => x.id !== pendingDel);
    if (selId === pendingDel) selId = null;
    save(); closeM('confirmModal'); render();
    toast('🗑️ মুছে গেছে');
  };
  openM('confirmModal');
}

// TRANSACTION
function openTx(type) {
  txType = type;
  document.getElementById('txTitle').textContent = type === 'loan' ? '💸 ধার যোগ করুন' : '✅ পরিশোধ যোগ করুন';
  document.getElementById('txBtn').style.background = type === 'loan'
    ? 'linear-gradient(135deg,#c0392b,#e74c3c)' : 'linear-gradient(135deg,#059669,#10b981)';
  document.getElementById('txAmt').value = '';
  document.getElementById('txDate').value = today();
  document.getElementById('txNote').value = '';
  openM('addTxModal');
  setTimeout(() => document.getElementById('txAmt').focus(), 250);
}
function addTx() {
  const amt = parseFloat(document.getElementById('txAmt').value);
  if (!amt || amt <= 0) { toast('⚠️ সঠিক পরিমাণ দিন'); return; }
  const c = data.find(x => x.id === selId);
  if (!c) return;
  c.tx.push({ id: uid(), type: txType, amt, date: document.getElementById('txDate').value || today(), note: document.getElementById('txNote').value.trim() });
  save(); closeM('addTxModal'); render();
  toast(txType === 'loan' ? '💸 ধার যোগ হয়েছে' : '✅ পরিশোধ যোগ হয়েছে');
}

// RENDER
function render() {
  updateSummary();
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const list = document.getElementById('customerList');
  let filtered = data;
  if (q) filtered = data.filter(c => c.name.toLowerCase().includes(q) || (c.phone||'').includes(q));

  if (!filtered.length) {
    list.innerHTML = data.length === 0
      ? `<div class="empty-state"><div class="e-icon">📒</div><h3>কোনো গ্রাহক নেই</h3><p>নিচের ➕ বাটন চেপে নতুন গ্রাহক যোগ করুন</p></div>`
      : `<div class="no-result">🔍 কোনো গ্রাহক পাওয়া যায়নি</div>`;
    return;
  }

  list.innerHTML = filtered.map(c => {
    const r = calc(c);
    const isSel = c.id === selId;
    return `
      <div class="customer-card${isSel?' selected':''}" id="cc-${c.id}">
        <div class="card-top" onclick="toggle('${c.id}')">
          <div class="card-info">
            <div class="avatar">${initials(c.name)}</div>
            <div>
              <div class="card-name">${c.name}</div>
              <div class="card-phone">${c.phone?'📱 '+c.phone:'ফোন নেই'}</div>
            </div>
          </div>
          <button class="btn-del" onclick="event.stopPropagation();delCustomer('${c.id}')">🗑️</button>
        </div>
        <div class="card-stats">
          <div class="stat-item"><div class="stat-label">💸 ধার</div><div class="stat-val stat-loan">${money(r.loan)}</div></div>
          <div class="stat-item"><div class="stat-label">✅ দিয়েছে</div><div class="stat-val stat-paid">${money(r.paid)}</div></div>
          <div class="stat-item"><div class="stat-label">⚠️ বাকি</div><div class="stat-val stat-due">${money(Math.max(0,r.due))}</div></div>
        </div>
        ${isSel ? txPanel(c) : ''}
      </div>`;
  }).join('');
}

function txPanel(c) {
  const txs = [...(c.tx||[])].sort((a,b) => new Date(b.date)-new Date(a.date));
  const rows = txs.length === 0
    ? `<div class="tx-empty">এখনো কোনো লেনদেন নেই</div>`
    : txs.map(t => `
        <div class="tx-item tx-${t.type}">
          <div class="tx-left">
            <div class="tx-icon">${t.type==='loan'?'💸':'✅'}</div>
            <div>
              <div class="tx-type">${t.type==='loan'?'ধার':'পরিশোধ'}${t.note?' — '+t.note:''}</div>
              <div class="tx-date">${fmtDate(t.date)}</div>
            </div>
          </div>
          <div class="tx-amount">${money(t.amt)}</div>
        </div>`).join('');
  return `
    <div class="detail-panel" onclick="event.stopPropagation()">
      <div class="detail-header"><h3>📋 লেনদেনের ইতিহাস</h3><span>${bn(txs.length)} টি</span></div>
      <div class="detail-actions">
        <button class="btn-action btn-loan" onclick="openTx('loan')">💸 ধার দিন</button>
        <button class="btn-action btn-payment" onclick="openTx('payment')">✅ পরিশোধ</button>
      </div>
      <div class="tx-list">${rows}</div>
    </div>`;
}

function toggle(id) {
  selId = selId === id ? null : id;
  render();
  if (selId) setTimeout(() => { const el = document.getElementById('cc-'+id); if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'}); }, 100);
}

// ENTER keys
document.getElementById('cName').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('cPhone').focus(); });
document.getElementById('cPhone').addEventListener('keydown', e => { if(e.key==='Enter') addCustomer(); });
document.getElementById('txAmt').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('txDate').focus(); });

render();
</script>
</body>
</html>
